services:
  web:
    build: .
    volumes:
      - .:/app
      - certs_data:/data/certs
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=open_cvpn.settings
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CERT_STORAGE_ROOT=/data/certs
      - DJANGO_STATIC_ROOT=${DJANGO_STATIC_ROOT:-/tmp/catalyst-staticfiles}
      - DJANGO_GENERATED_STATIC_DIR=${DJANGO_GENERATED_STATIC_DIR:-/tmp/catalyst-generated-static}
      - RUN_BUILD_STATIC=${RUN_BUILD_STATIC:-true}
      - RUN_COLLECTSTATIC=${RUN_COLLECTSTATIC:-true}
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  celery:
    build: .
    command: ["celery", "-A", "open_cvpn", "worker", "-l", "INFO"]
    volumes:
      - .:/app
      - certs_data:/data/certs
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=open_cvpn.settings
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CERT_STORAGE_ROOT=/data/certs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    command: ["celery", "-A", "open_cvpn", "beat", "-l", "INFO", "--schedule", "/tmp/celerybeat-schedule"]
    volumes:
      - .:/app
      - certs_data:/data/certs
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=open_cvpn.settings
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CERT_STORAGE_ROOT=/data/certs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  certs_data:
