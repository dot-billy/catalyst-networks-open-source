{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Create Organization</h1>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Create Organization</button>
            <a href="{% url 'organizations:list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
