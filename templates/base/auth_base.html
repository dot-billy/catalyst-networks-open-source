<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ project_meta.NAME }}{% endblock %}</title>

    <meta name="description" content="{% block description %}{{ project_meta.DESCRIPTION }}{% endblock %}">
    <meta name="keywords" content="{{ project_meta.KEYWORDS }}">
    <meta property="og:title" content="{% block og_title %}{{ project_meta.NAME }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{{ project_meta.DESCRIPTION }}{% endblock %}">
    <meta property="og:image" content="{{ project_meta.URL }}{{ project_meta.IMAGE }}">
    <meta property="og:url" content="{{ project_meta.URL }}">
    <meta property="og:type" content="website">

    {% load static %}
    {% include 'components/favicon.html' %}

    <link rel="stylesheet" href="{% static 'css/fonts.css' %}?v={{ static_asset_version|urlencode }}">
    <link rel="stylesheet" href="{% static 'css/tailwind-output.css' %}?v={{ static_asset_version|urlencode }}">
    <link rel="stylesheet" href="{% static 'css/design-system.css' %}?v={{ static_asset_version|urlencode }}">
    <link rel="stylesheet" href="{% static 'css/catalyst-theme.css' %}?v={{ static_asset_version|urlencode }}">
    <link rel="stylesheet" href="{% static 'css/catalyst-overrides.css' %}?v={{ static_asset_version|urlencode }}">
    <link rel="stylesheet" href="{% static 'css/forms.css' %}?v={{ static_asset_version|urlencode }}">

    {% block extra_head %}{% endblock %}
</head>
<body class="catalyst-body">
    <main class="catalyst-auth-shell">
        <div class="catalyst-auth-panel {% block auth_panel_class %}{% endblock %}">
            {% if messages %}
                <div class="catalyst-auth-messages">
                    {% for message in messages %}
                    <div class="catalyst-alert catalyst-alert-{{ message.tags|default:'info' }}">
                        <div class="catalyst-alert-content">
                            <p>{{ message }}</p>
                        </div>
                        <button type="button" class="catalyst-alert-close" onclick="this.parentElement.remove()" aria-label="Dismiss message">
                            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}{% endblock %}
        </div>
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
