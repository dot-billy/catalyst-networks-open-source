<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ project_meta.NAME }}{% endblock %}</title>

    <meta name="description" content="{% block description %}{{ project_meta.DESCRIPTION }}{% endblock %}">
    <meta name="keywords" content="{{ project_meta.KEYWORDS }}">
    <meta property="og:title" content="{% block og_title %}{{ project_meta.NAME }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{{ project_meta.DESCRIPTION }}{% endblock %}">
    <meta property="og:image" content="{{ project_meta.URL }}{{ project_meta.IMAGE }}">
    <meta property="og:url" content="{{ project_meta.URL }}">
    <meta property="og:type" content="website">

    {% load static %}
    {% include 'components/favicon.html' %}

    <script>
        (function() {
            const warn = console.warn;
            console.warn = function() {
                if (arguments[0] && typeof arguments[0] === 'string' &&
                    arguments[0].includes('cdn.tailwindcss.com should not be used in production')) {
                    return;
                }
                return warn.apply(console, arguments);
            };
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f9fafb',
                            100: '#f3f4f6',
                            200: '#e5e7eb',
                            300: '#d1d5db',
                            400: '#6b7280',
                            500: '#111827',
                            600: '#030712',
                            700: '#030712',
                            800: '#030712',
                            900: '#030712',
                        },
                        secondary: {
                            50: '#fafafa',
                            100: '#f4f4f5',
                            200: '#e4e4e7',
                            300: '#d4d4d8',
                            400: '#a1a1aa',
                            500: '#71717a',
                            600: '#52525b',
                            700: '#3f3f46',
                            800: '#27272a',
                            900: '#18181b',
                        },
                        dark: {
                            700: '#f4f4f5',
                            800: '#ffffff',
                            900: '#ffffff',
                        },
                        light: {
                            100: '#111827',
                            200: '#374151',
                            300: '#6b7280',
                            400: '#9ca3af',
                        },
                        'catalyst-success': '#15803d',
                        'catalyst-warning': '#b45309',
                        'catalyst-error': '#dc2626',
                    },
                    boxShadow: {
                        glow: '0 12px 32px rgba(17, 24, 39, 0.08)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.1/dist/cdn.min.js"></script>

    <link rel="stylesheet" href="{% static 'css/fonts.css' %}?v={{ static_asset_version|urlencode }}">
    <link rel="stylesheet" href="{% static 'css/design-system.css' %}?v={{ static_asset_version|urlencode }}">
    <link rel="stylesheet" href="{% static 'css/catalyst-theme.css' %}?v={{ static_asset_version|urlencode }}">
    <link rel="stylesheet" href="{% static 'css/catalyst-overrides.css' %}?v={{ static_asset_version|urlencode }}">
    <link rel="stylesheet" href="{% static 'css/forms.css' %}?v={{ static_asset_version|urlencode }}">
    <style>
        .catalyst-auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background: #f8fafc;
        }

        .catalyst-auth-panel {
            width: 100%;
            max-width: 34rem;
        }

        .catalyst-auth-panel-wide {
            max-width: 48rem;
        }

        .catalyst-auth-messages {
            margin-bottom: 1rem;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="catalyst-body">
    <main class="catalyst-auth-shell">
        <div class="catalyst-auth-panel {% block auth_panel_class %}{% endblock %}">
            {% if messages %}
                <div class="catalyst-auth-messages">
                    {% for message in messages %}
                    <div class="catalyst-alert catalyst-alert-{{ message.tags|default:'info' }}">
                        <div class="catalyst-alert-content">
                            <p>{{ message }}</p>
                        </div>
                        <button type="button" class="catalyst-alert-close" onclick="this.parentElement.remove()" aria-label="Dismiss message">
                            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}{% endblock %}
        </div>
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
