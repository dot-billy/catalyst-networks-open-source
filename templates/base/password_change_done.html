{% extends "base/base.html" %}

{% block title %}Password Changed - {{ project_meta.NAME }}{% endblock %}
{% block page_title %}Password changed{% endblock %}

{% block content %}
    <div class="max-w-md mx-auto py-8">
        <div class="ui-form-section text-center">
            <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-green-100">
                <svg class="h-8 w-8 text-green-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h1 class="ui-page-title text-3xl">Password changed</h1>
            <p class="ui-page-subtitle max-w-none mt-3">Your password has been updated successfully.</p>

            <div class="mt-8">
                <a href="{% url 'profile' %}" class="btn-enhanced ui-button-primary">Back to profile</a>
            </div>
        </div>
    </div>
{% endblock %}
